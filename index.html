<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Mesh Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🧊 Roblox Mesh Studio</h1>

<p class="version">
Versión 0.1.1
</p>

</header>

<div class="container">

<div class="card">

<h2>📂 Archivo</h2>

<input
type="file"
id="meshInput"
accept=".mesh">

<button id="readBtn">
Abrir Mesh
</button>

</div>

<div class="card">

<h2>📋 Información</h2>

<pre id="info">
Esperando archivo...
</pre>

</div>

<div class="card">

<h2>🔍 Inspector</h2>

<p>
🚧 Disponible en la versión 0.2.0
</p>

</div>

<div class="card">

<h2>👁 Vista 3D</h2>

<p>
🚧 Disponible próximamente
</p>

</div>

<div class="card">

<h2>📤 Exportación</h2>

<p>
🚧 OBJ / Mesh próximamente
</p>

</div>

</div>

<footer>

<p>
Roblox Mesh Studio • Proyecto en desarrollo
</p>

</footer>

<script src="script.js"></script>

</body>

</html>
